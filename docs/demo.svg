<svg xmlns="http://www.w3.org/2000/svg" width="720" height="180" viewBox="0 0 720 180">
  <style>
    .bg { fill: #0f1724 }
    .panel { fill: #01060a; stroke: #0f1724; stroke-width: 2 }
    .text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", monospace; font-size: 14px; fill: #cbd5e1 }
    .green { fill: #22c55e }
    .fade { animation: fade 1s ease-in-out forwards }
    .type { opacity: 0; animation: type 1.6s steps(24, end) forwards }
    @keyframes fade { to { opacity: 1 } }
    @keyframes type { 0% { opacity: 0 } 10% { opacity: 1 } 100% { opacity: 1 } }
    .blink { animation: blink 1s step-end infinite }
    @keyframes blink { 50% { opacity: 0 } }
  </style>

  <rect class="bg" width="100%" height="100%" rx="10"/>
  <g transform="translate(20,20)">
    <rect class="panel" width="680" height="140" rx="8"/>
    <g transform="translate(16,24)">
      <text class="text" x="0" y="0">$ gitlog generate</text>
      <text class="text" x="0" y="28" style="opacity:0" id="line1">Fetching commits...</text>
      <text class="text" x="0" y="56" style="opacity:0" id="line2">Classifying commits (rules + LLM fallback)...</text>
      <text class="text green" x="0" y="92" style="opacity:0" id="line3">✓ Changelog written to CHANGELOG.md</text>
      <rect x="0" y="104" width="300" height="16" fill="#0b1220" rx="4"/>
      <rect x="0" y="104" width="0" height="16" fill="#22c55e" rx="4">
        <animate attributeName="width" from="0" to="300" dur="2.0s" begin="0.3s" fill="freeze" />
      </rect>
      <g transform="translate(320,0)">
        <text class="text" x="0" y="0" opacity="0" id="caption">Fast. Local-first. CI friendly.</text>
      </g>
    </g>
  </g>

  <script><![CDATA[
    (function(){
      const show = (id, delay) => setTimeout(()=>{document.getElementById(id).style.opacity=1}, delay);
      show('line1', 300);
      show('line2', 900);
      show('line3', 2300);
      show('caption', 2500);
    })();
  ]]></script>
</svg>
